name: Playwright Tests

# Smoke — each PR | Sanity — each push | Regression (full suite) — on demand
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ github.event_name == 'pull_request' && 'Smoke' || github.event_name == 'push' && 'Sanity' || 'Regression (full suite)' }}
    timeout-minutes: ${{ github.event_name == 'workflow_dispatch' && 60 || 30 }}
    runs-on: ubuntu-latest
    environment: dev1
    env:
      CI: true
      DIDAXIS_URL: ${{ secrets.DIDAXIS_URL }}
      DIDAXIS_EMAIL: ${{ secrets.DIDAXIS_EMAIL }}
      DIDAXIS_PASSWORD: ${{ secrets.DIDAXIS_PASSWORD }}
      DIDAXIS_API_TOKEN: ${{ secrets.DIDAXIS_API_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Select suite
        id: suite
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              echo "command=npm run test:smoke" >> "$GITHUB_OUTPUT"
              echo "label=smoke" >> "$GITHUB_OUTPUT"
              ;;
            push)
              echo "command=npm run test:sanity" >> "$GITHUB_OUTPUT"
              echo "label=sanity" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              echo "command=npm run test:ci" >> "$GITHUB_OUTPUT"
              echo "label=regression" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported event: ${{ github.event_name }}" >&2
              exit 1
              ;;
          esac

      - name: Run Playwright tests (${{ steps.suite.outputs.label }})
        run: ${{ steps.suite.outputs.command }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ steps.suite.outputs.label }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results (traces)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ steps.suite.outputs.label }}
          path: test-results/
          retention-days: 30
